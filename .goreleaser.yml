# Visit https://goreleaser.com for documentation on how to customize this behavior.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      # goreleaser does not work with CGO; it also complicates usage
      # in CI/CD systems like HCP Terraform where users cannot
      # install shared libraries.
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}} -X main.commit={{.Commit}}'
    goos:
      - darwin
      - freebsd
      - linux
      - windows
    goarch:
      - '386'
      - amd64
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: '386'
    binary: '{{ .ProjectName }}_v{{ .Version }}'

archives:
  - formats: [zip]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      # --batch tells gpg the run is non-interactive (required in CI).
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  # release-please publishes the GitHub Release, then triggers the
  # goreleaser workflow. Keep `draft: false` so the registry picks it
  # up immediately.
  draft: false

changelog:
  # release-please owns CHANGELOG.md; goreleaser should not double-write.
  disable: true
